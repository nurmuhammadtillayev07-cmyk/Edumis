<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - EduMIS</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .box {
            text-align: center;
            background: white;
            border-radius: 20px;
            padding: 40px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            max-width: 320px;
        }
        .icon { font-size: 3rem; margin-bottom: 16px; }
        h1 { font-size: 1.1rem; color: #0f172a; margin: 0 0 8px 0; }
        p { font-size: 0.85rem; color: #64748b; line-height: 1.5; margin: 0 0 20px 0; }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">📡</div>
        <h1>Internet aloqasi yo'q</h1>
        <p>Ushbu sahifa hozircha oflayn rejimda ishlamaydi. Internetga ulanib, qaytadan urinib ko'ring.</p>
        <button onclick="window.location.reload()">Qaytadan urinish</button>
    </div>
</body>
</html>
