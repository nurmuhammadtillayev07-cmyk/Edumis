{% extends 'base.html' %}
{% block content %}
<link rel="stylesheet" href="/static/css/timetable.css">

<div class="tt-page tt-admin">
  <div class="tt-toolbar">
    <select id="tt-class-select"></select>
    <button id="tt-copy-day-btn" class="tt-btn tt-btn-ghost"><i class="fa-solid fa-copy"></i> Kunni nusxalash</button>
    <button id="tt-copy-class-btn" class="tt-btn tt-btn-ghost"><i class="fa-solid fa-clone"></i> Sinfdan nusxa olish</button>
    <button id="tt-history-btn" class="tt-btn tt-btn-ghost"><i class="fa-solid fa-clock-rotate-left"></i> Tarix</button>
    <button id="tt-import-btn" class="tt-btn tt-btn-ghost"><i class="fa-solid fa-file-import"></i> Import</button>
    <input type="file" id="tt-import-file" accept=".xlsx" style="display:none;">
    <button id="tt-export-excel" class="tt-btn tt-btn-ghost"><i class="fa-solid fa-file-excel"></i> Excel</button>
    <button id="tt-export-pdf" class="tt-btn tt-btn-ghost"><i class="fa-solid fa-file-pdf"></i> PDF</button>
    <button id="tt-print-btn" class="tt-btn tt-btn-ghost"><i class="fa-solid fa-print"></i></button>
    <button id="tt-theme-toggle" class="tt-theme-toggle"><i class="fa-solid fa-circle-half-stroke"></i></button>
  </div>

  <div id="tt-conflict-banner" class="tt-conflict-banner"></div>

  <p style="font-size:0.78rem;color:var(--tt-text-dim);margin-bottom:8px;">
    Fanni pastdagi ro'yxatdan bo'sh katakka sudrab tashlang. Mavjud darsni boshqa katakka sudrab ko'chiring.
    Darsni o'chirish uchun ustiga ikki marta bosing.
  </p>

  <div class="tt-subject-pool" id="tt-subject-pool"></div>

  <div class="tt-grid-wrap">
    <div class="tt-grid" id="tt-grid"></div>
  </div>

  <div class="tt-history-panel" id="tt-history-panel" style="display:none;"></div>
</div>

<script src="/static/js/timetable-admin.js"></script>
{% endblock %}
