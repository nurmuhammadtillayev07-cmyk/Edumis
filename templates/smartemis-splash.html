<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartEMIS — Yuklanmoqda</title>
<style>
  :root{
    --navy-deep:#0a2647;
    --navy:#144272;
    --blue:#205295;
    --blue-bright:#2c74b3;
    --ice:#f4f9ff;
    --ice-2:#e8f2ff;
    --gold:#c9a35f;
    --text-dim:#7fa8d9;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    height:100%;
    width:100%;
    overflow:hidden;
    font-family:'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background:var(--ice);
  }

  /* ============ SPLASH ============ */
  #splash{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 20% 15%, rgba(44,116,179,0.10), transparent 45%),
      radial-gradient(circle at 85% 85%, rgba(20,66,114,0.12), transparent 50%),
      linear-gradient(150deg, #ffffff 0%, #eef5fc 38%, #dcebf9 68%, #cfe4f7 100%);
    transition: opacity 0.9s cubic-bezier(.4,0,.2,1), filter 0.9s ease;
  }
  #splash.fade-out{
    opacity:0;
    filter:blur(6px);
    pointer-events:none;
  }

  /* faint architectural grid, gives a "government system" gravitas */
  #splash::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(20,66,114,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(20,66,114,0.05) 1px, transparent 1px);
    background-size:64px 64px;
    mask-image:radial-gradient(ellipse at center, black 10%, transparent 72%);
    -webkit-mask-image:radial-gradient(ellipse at center, black 10%, transparent 72%);
  }

  .splash-inner{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding:0 24px;
    width:100%;
    max-width:520px;
  }

  /* ============ LOGO (network + academic mark, no external assets) ============ */
  .logo-wrap{
    position:relative;
    width:min(34vw, 148px);
    height:min(34vw, 148px);
    margin-bottom:clamp(20px,4vh,32px);
    opacity:0;
    transform:translateY(14px) scale(.92);
    animation:riseIn 0.9s cubic-bezier(.22,1,.36,1) forwards;
    animation-delay:0.15s;
  }

  .orbit-ring{
    position:absolute; inset:0;
    border-radius:50%;
    border:1.5px solid rgba(32,82,149,0.25);
  }
  .orbit-ring.r2{
    inset:14px;
    border-color:rgba(44,116,179,0.35);
    animation:spin 7s linear infinite;
  }
  .orbit-ring.r2::after,
  .orbit-ring.r2::before{
    content:"";
    position:absolute;
    width:6px;height:6px;
    border-radius:50%;
    background:var(--gold);
    box-shadow:0 0 8px 1px rgba(201,163,95,0.7);
  }
  .orbit-ring.r2::before{ top:-3px; left:50%; transform:translateX(-50%); }
  .orbit-ring.r2::after{ bottom:-3px; left:50%; transform:translateX(-50%); }

  .logo-core{
    position:absolute;
    inset:22px;
    border-radius:50%;
    background:linear-gradient(155deg, var(--navy) 0%, var(--blue) 55%, var(--blue-bright) 100%);
    box-shadow:
      0 12px 32px -8px rgba(10,38,71,0.45),
      0 2px 6px rgba(10,38,71,0.25),
      inset 0 1px 1px rgba(255,255,255,0.35);
    display:flex; align-items:center; justify-content:center;
  }

  .logo-core svg{
    width:52%;
    height:52%;
    stroke:#f4f9ff;
    fill:none;
  }

  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes riseIn{
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  /* ============ WORDMARK ============ */
  .brand-name{
    font-size:clamp(1.8rem, 6vw, 2.6rem);
    font-weight:800;
    letter-spacing:0.5px;
    color:var(--navy-deep);
    opacity:0;
    transform:translateY(10px);
    animation:riseIn 0.8s cubic-bezier(.22,1,.36,1) forwards;
    animation-delay:0.5s;
  }
  .brand-name span{ color:var(--blue-bright); }

  .brand-tagline{
    margin-top:8px;
    font-size:clamp(0.82rem, 2.4vw, 0.98rem);
    font-weight:500;
    letter-spacing:0.3px;
    color:var(--blue);
    opacity:0;
    transform:translateY(8px);
    animation:riseIn 0.8s cubic-bezier(.22,1,.36,1) forwards;
    animation-delay:0.75s;
  }

  .divider{
    width:40px; height:2px;
    margin:clamp(20px,4vh,28px) 0 clamp(20px,4vh,28px);
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity:0;
    animation:fadeSimple 0.8s ease forwards;
    animation-delay:0.95s;
  }
  @keyframes fadeSimple{ to{ opacity:1; } }

  /* ============ PROGRESS ============ */
  .progress-zone{
    width:min(70vw, 260px);
    opacity:0;
    animation:fadeSimple 0.8s ease forwards;
    animation-delay:1.1s;
  }

  .progress-track{
    position:relative;
    width:100%;
    height:4px;
    border-radius:4px;
    background:rgba(20,66,114,0.12);
    overflow:hidden;
  }
  .progress-fill{
    position:absolute; left:0; top:0; bottom:0;
    width:0%;
    border-radius:4px;
    background:linear-gradient(90deg, var(--blue) 0%, var(--blue-bright) 60%, var(--gold) 100%);
    animation:fillProgress 5s cubic-bezier(.3,0,.2,1) forwards;
    animation-delay:0.2s;
  }
  @keyframes fillProgress{ to{ width:100%; } }

  .loading-text{
    margin-top:14px;
    font-size:0.8rem;
    font-weight:600;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--text-dim);
  }
  .loading-text .dots span{
    display:inline-block;
    animation:blink 1.4s infinite;
  }
  .loading-text .dots span:nth-child(2){ animation-delay:0.2s; }
  .loading-text .dots span:nth-child(3){ animation-delay:0.4s; }
  @keyframes blink{
    0%, 80%, 100%{ opacity:0.15; }
    40%{ opacity:1; }
  }

  .system-id{
    position:absolute;
    bottom:22px;
    left:0; right:0;
    text-align:center;
    font-size:0.68rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:rgba(20,66,114,0.45);
    opacity:0;
    animation:fadeSimple 1s ease forwards;
    animation-delay:1.4s;
  }

  @media (prefers-reduced-motion: reduce){
    .orbit-ring.r2{ animation:none; }
    .logo-wrap, .brand-name, .brand-tagline, .divider, .progress-zone, .system-id{
      animation-duration:0.01s !important;
      animation-delay:0s !important;
    }
    .progress-fill{ animation-duration:5s; animation-delay:0s; }
  }

  /* ============ LOGIN PAGE (placeholder target) ============ */
  #login{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(150deg, #ffffff 0%, #eef5fc 45%, #dcebf9 100%);
    opacity:0;
    transition:opacity 0.9s ease;
  }
  #login.show{ opacity:1; }
  .login-card{
    width:min(90vw,380px);
    padding:40px 32px;
    background:#fff;
    border-radius:16px;
    box-shadow:0 20px 50px -12px rgba(10,38,71,0.18);
    text-align:center;
  }
  .login-card h2{
    color:var(--navy-deep);
    font-size:1.3rem;
    margin-bottom:6px;
  }
  .login-card p{
    color:var(--blue);
    font-size:0.85rem;
    margin-bottom:24px;
  }
  .login-card input{
    width:100%;
    padding:12px 14px;
    margin-bottom:12px;
    border:1.5px solid #dce8f7;
    border-radius:8px;
    font-size:0.9rem;
    outline:none;
  }
  .login-card input:focus{ border-color:var(--blue-bright); }
  .login-card button{
    width:100%;
    padding:12px;
    margin-top:6px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,var(--blue),var(--blue-bright));
    color:#fff;
    font-weight:600;
    font-size:0.9rem;
    cursor:pointer;
    letter-spacing:0.3px;
  }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-inner">
    <div class="logo-wrap">
      <div class="orbit-ring"></div>
      <div class="orbit-ring r2"></div>
      <div class="logo-core">
        <!-- graduation-cap / open-book mark -->
        <svg viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3 2 8l10 5 10-5-10-5z"></path>
          <path d="M6 10.5V16c0 1.4 2.7 3 6 3s6-1.6 6-3v-5.5"></path>
          <path d="M22 8v6"></path>
        </svg>
      </div>
    </div>

    <h1 class="brand-name">Smart<span>EMIS</span></h1>
    <p class="brand-tagline">Ta'limni boshqarishning zamonaviy axborot tizimi</p>

    <div class="divider"></div>

    <div class="progress-zone">
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
      <div class="loading-text">
        Tizim yuklanmoqda<span class="dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
    </div>
  </div>

  <div class="system-id">Education Management Information System</div>
</div>

<div id="login">
  <div class="login-card">
    <h2>Tizimga kirish</h2>
    <p>SmartEMIS shaxsiy kabinetingiz</p>
    <input type="text" placeholder="Foydalanuvchi nomi">
    <input type="password" placeholder="Parol">
    <button>Kirish</button>
  </div>
</div>

<script>
  const TOTAL_MS = 5000;
  const FADE_MS = 900;

  const splash = document.getElementById('splash');
  const login = document.getElementById('login');

  setTimeout(() => {
    splash.classList.add('fade-out');
    setTimeout(() => {
      splash.style.display = 'none';
      login.classList.add('show');
    }, FADE_MS);
  }, TOTAL_MS - 100);
</script>

</body>
</html>
