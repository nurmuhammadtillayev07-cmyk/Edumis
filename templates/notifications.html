{% extends 'base.html' %}
{% block content %}
<div style="padding: 16px; margin-top: 15px;">
    <h3 style="font-size: 1.15rem; font-weight: 700; color: #1e3a8a; margin-bottom: 16px;">{{ t('notifications_title') }}</h3>
    <div style="display: flex; flex-direction: column; gap: 12px;">
        {% for n in notifications %}
        <div style="background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 16px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                <h4 style="font-size: 0.9rem; font-weight: 700; color: #1e40af;">{{ n.title }}</h4>
                <span style="font-size: 0.75rem; color: #64748b;">{{ n.date }}</span>
            </div>
            <p style="font-size: 0.8rem; color: #1e3a8a; line-height: 1.4;">{{ n.content }}</p>
        </div>
        {% else %}
        <p style="text-align: center; color: #94a3b8; padding: 30px; font-size: 0.85rem;">{{ t('notifications_empty') }}</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
